<!DOCTYPE html>
<!--
============================================================
  우리 가족 스케줄 앱  ·  4-2a단계 : 날짜별 예외 추가
------------------------------------------------------------
  이제 앱이 '날짜별'로 움직여요.
   · 데일리 = 오늘,  주간 = 이번 주,  월간 = 고른 날짜
   · 각 화면은 [기본 일정] + [그 날짜 예외]를 합쳐서 보여줘요.

  + 로 일정을 추가할 때 '언제 적용할지'를 고를 수 있어요:
   이 날짜만 / 이 주 / 이 달 / 올해 / 직접 선택 / 매일(기본)

  (이 날짜만 '수정·삭제'는 다음 4-2b에서 붙여요.)
============================================================
-->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>우리 가족 스케줄</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FAF8F4; --card: #FFFFFF; --ink: #2C2C2A;
      --muted: #8C8B82; --line: #ECEAE2; --accent: #2B7A78;
      --all: #6B8E5A; --dad: #3B7DBF; --mom: #E08A4E; --child: #34A79A;
    }
    body { background: var(--bg); color: var(--ink); font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
    .app { max-width: 480px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; background: var(--bg); position: relative; }
    .header { padding: 18px 20px 14px; border-bottom: 1px solid var(--line); background: var(--card); }
    .header h1 { font-size: 19px; font-weight: 600; }
    .header .date { margin-top: 3px; font-size: 13px; color: var(--muted); }
    .content { flex: 1; overflow-y: auto; padding: 18px 16px; }
    .tabbar { display: flex; border-top: 1px solid var(--line); background: var(--card); padding-bottom: env(safe-area-inset-bottom); }
    .tab { flex: 1; border: none; background: none; padding: 9px 0 8px; color: var(--muted); font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .tab svg { width: 23px; height: 23px; }
    .tab.active { color: var(--accent); font-weight: 600; }

    .screen { display: none; }
    .screen.active { display: block; }
    .screen-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

    .people { display: flex; gap: 8px; margin-bottom: 14px; }
    .person { flex: 1; border: 1.5px solid var(--line); background: var(--card); border-radius: 999px; padding: 9px 0; font-size: 14px; color: var(--ink); cursor: pointer; font-family: inherit; }
    .person.active { color: #fff; border-color: transparent; }

    .clock-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px 10px 12px; }
    #daily-clock svg, #week-chart svg, #day-detail .clock-card svg { width: 100%; display: block; margin: 0 auto; }
    #daily-clock svg, #day-detail .clock-card svg { max-width: 320px; }
    #week-chart svg { max-width: 360px; }
    .legend { display: flex; flex-wrap: wrap; gap: 7px 14px; justify-content: center; margin-top: 8px; }
    .legend .lg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .legend .dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

    .list { background: var(--card); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; margin-top: 14px; }
    .item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-bottom: 1px solid var(--line); border-left: 4px solid var(--line); }
    .item:last-child { border-bottom: none; }
    .item .time { font-size: 13px; color: var(--muted); width: 96px; flex-shrink: 0; }
    .item .ititle { font-size: 15px; flex: 1; }
    .item .badge { font-size: 11px; color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; padding: 1px 5px; }
    .item .who { font-size: 12px; font-weight: 600; }
    .item.now { background: #FFF3E0; }
    .item.now .time { color: #B4691A; }
    .nowbadge { font-size: 11px; color: #fff; background: #C0392B; border-radius: 6px; padding: 1px 6px; margin-left: 4px; }
    .item .edby { font-size: 11px; color: var(--muted); margin-left: 4px; }
    .item .edby.mine { color: var(--accent); font-weight: 600; }
    .hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 12px; }
    .empty { text-align: center; color: var(--muted); padding: 24px; font-size: 14px; }

    .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-title { font-size: 15px; font-weight: 600; }
    .cal-nav { border: 1px solid var(--line); background: var(--card); border-radius: 8px; width: 34px; height: 34px; font-size: 17px; cursor: pointer; color: var(--ink); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-size: 12px; color: var(--muted); padding: 2px 0 4px; }
    .cal-dow.sun { color: #C4553B; } .cal-dow.sat { color: #3B6FBF; }
    .cal-cell { min-height: 62px; border: 1px solid var(--line); border-radius: 10px; background: var(--card); display: flex; flex-direction: column; padding: 4px 4px 3px; cursor: pointer; overflow: hidden; }
    .cal-cell.blank { border: none; background: transparent; cursor: default; }
    .cal-daynum { font-size: 13px; padding-left: 2px; }
    .cal-cell.today { border-color: var(--accent); }
    .cal-cell.today .cal-daynum { color: var(--accent); font-weight: 700; }
    .cal-cell.selected { box-shadow: inset 0 0 0 1.6px var(--accent); border-color: transparent; }
    .cal-cell.selected .cal-daynum { color: var(--accent); font-weight: 700; }
    .cal-evs { display: flex; flex-direction: column; gap: 2px; margin-top: 2px; overflow: hidden; }
    .cal-ev { font-size: 8.5px; line-height: 1.5; color: #fff; border-radius: 3px; padding: 0 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-more { font-size: 8px; color: var(--muted); padding-left: 2px; }
    .week-evs { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 10px; }
    .wcol-day { text-align: center; font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .wcol-day .wnum { display: block; font-size: 12px; color: var(--ink); font-weight: 600; }
    .wcol.wtoday .wnum { color: var(--accent); }
    .wcol-list { display: flex; flex-direction: column; gap: 2px; min-height: 4px; }
    .wedit { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--mom); margin-left: 3px; }
    .day-detail { margin-top: 18px; }
    .day-detail h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }

    .fab { position: absolute; right: 16px; bottom: calc(66px + env(safe-area-inset-bottom)); width: 54px; height: 54px; border-radius: 50%; border: none; background: var(--accent); color: #fff; font-size: 28px; line-height: 1; box-shadow: 0 4px 14px rgba(0,0,0,0.18); cursor: pointer; z-index: 30; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: none; align-items: flex-end; justify-content: center; z-index: 40; }
    .head-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .hist-btn { background: var(--card); border: 1px solid var(--line); color: var(--ink); border-radius: 999px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .who-ask { font-size: 13px; color: var(--ink); margin-bottom: 14px; }
    .who-sub { font-size: 11px; color: var(--muted); }
    .who-btns { display: flex; gap: 8px; margin-top: 8px; }
    .who-b { flex: 1; border: 1.5px solid var(--line); background: var(--card); border-radius: 10px; padding: 9px 0; font-size: 14px; cursor: pointer; font-family: inherit; color: var(--ink); }
    .who-b.on { background: var(--accent); color: #fff; border-color: transparent; }
    .hist-list { max-height: 52vh; overflow-y: auto; margin-bottom: 8px; }
    .hist-empty { color: var(--muted); font-size: 14px; text-align: center; padding: 24px 0; }
    .hist-item { border-bottom: 1px solid var(--line); padding: 10px 2px; }
    .hist-top { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .hist-who { font-size: 13px; font-weight: 600; color: var(--ink); }
    .hist-who.mine { color: var(--accent); }
    .hist-time { font-size: 12px; color: var(--muted); }
    .hist-body { font-size: 14px; color: var(--ink); }
    .hist-act { font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 999px; color: #fff; margin-right: 4px; }
    .hist-act.add { background: #6B8E5A; } .hist-act.edit { background: #3B7DBF; } .hist-act.del { background: #C0392B; }
    .hist-when { font-size: 12px; color: var(--muted); }
    .modal.open { display: flex; }
    .sheet { background: var(--card); width: 100%; max-width: 480px; border-radius: 18px 18px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); max-height: 90vh; overflow-y: auto; }
    .sheet h3 { font-size: 17px; font-weight: 600; margin-bottom: 14px; }
    .form-msg { color: #C0392B; font-size: 13px; margin-bottom: 10px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .field input { width: 100%; border: 1.5px solid var(--line); border-radius: 10px; padding: 11px 12px; font-size: 15px; font-family: inherit; color: var(--ink); background: var(--bg); }
    .who-pick { display: flex; gap: 8px; }
    .who-pick .person { flex: 1; }
    .times { display: flex; gap: 10px; }
    .times .field { flex: 1; }
    .edit-note { font-size: 12px; color: var(--muted); background: var(--bg); border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; }
    .scope-pick { display: flex; flex-wrap: wrap; gap: 8px; }
    .scope { border: 1.5px solid var(--line); background: var(--card); border-radius: 999px; padding: 8px 14px; font-size: 13px; color: var(--ink); cursor: pointer; font-family: inherit; }
    .scope.active { background: var(--accent); color: #fff; border-color: transparent; }
    .scope-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .minical { margin-top: 12px; border: 1px solid var(--line); border-radius: 12px; padding: 10px; }
    .mc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .mc-title { font-size: 13px; font-weight: 600; }
    .mc-nav { border: 1px solid var(--line); background: var(--card); border-radius: 8px; width: 30px; height: 30px; font-size: 15px; cursor: pointer; color: var(--ink); }
    .mc-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .mc-dow { text-align: center; font-size: 11px; color: var(--muted); }
    .mc-cell { aspect-ratio: 1 / 1; border: 1px solid var(--line); border-radius: 8px; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }
    .mc-cell.blank { border: none; background: transparent; cursor: default; }
    .mc-cell.sel { background: var(--accent); color: #fff; border-color: transparent; }
    .mc-allbtn { width: 100%; margin: 8px 0; background: var(--card); color: var(--accent); border: 1.5px solid var(--accent); border-radius: 8px; padding: 8px 0; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .sheet-btns { display: flex; gap: 10px; margin-top: 6px; }
    .btn { border: none; border-radius: 10px; padding: 13px 0; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-save { flex: 1; background: var(--accent); color: #fff; }
    .btn-cancel { flex: 1; background: var(--bg); color: var(--ink); border: 1.5px solid var(--line); }
    .btn-del { background: #FBECEC; color: #C0392B; border: 1.5px solid #F0D0D0; padding: 13px 16px; }
    .btn-gcal { width: 100%; margin-top: 10px; background: var(--card); color: var(--accent); border: 1.5px solid var(--accent); border-radius: 10px; padding: 12px 0; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .pin-row { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; cursor: pointer; }
    .pin-row input { width: 19px; height: 19px; accent-color: var(--accent); flex-shrink: 0; }
    .pin-row span { font-size: 14px; color: var(--ink); }
    .pin-row .sub { font-size: 12px; color: var(--muted); }
    .cat-note { font-size: 12px; color: var(--muted); font-weight: 400; }
    .cat-pick { display: flex; flex-wrap: wrap; gap: 7px; }
    .cat { border: 1.5px solid var(--line); background: var(--card); border-radius: 999px; padding: 6px 11px; font-size: 13px; color: var(--ink); cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
    .cat.active { font-weight: 600; border-color: transparent; }
    .cat .swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat .cat-x { display: none; margin-left: 4px; color: #C0392B; font-weight: 700; font-size: 14px; }
    #cat-pick.managing .cat .cat-x { display: inline; }
    .cat.cat-manage, .cat.cat-add { color: var(--accent); border-color: var(--accent); }
    .cat-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .cat-add-panel { margin-top: 10px; border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
    .cat-panel-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 9px; }
    .cat-add-panel input { width: 100%; border: 1.5px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 15px; font-family: inherit; color: var(--ink); background: var(--bg); margin-bottom: 10px; }
    .cat-colors { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .cat-colors .cc { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .cat-colors .cc.on { border-color: var(--ink); }
    .cat-add-btns { display: flex; gap: 8px; }
    .btn-mini { border: none; border-radius: 9px; padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; background: var(--accent); color: #fff; }
    .btn-mini.ghost { background: var(--bg); color: var(--ink); border: 1.5px solid var(--line); }
  </style>
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="head-row"><h1>우리 가족 스케줄</h1><button class="hist-btn" onclick="openHistory()">🕘 수정내역</button></div>
      <div class="date" id="today">날짜 불러오는 중…</div>
    </header>

    <!-- 최근 수정 내역 -->
    <div class="modal" id="hist-modal">
      <div class="sheet">
        <div class="sheet-title">최근 수정 내역</div>
        <div class="who-ask">이 폰은 누구세요? <span class="who-sub">(수정한 사람으로 기록돼요)</span>
          <div class="who-btns">
            <button class="who-b" data-w="dad" onclick="setDeviceWho('dad')">아빠</button>
            <button class="who-b" data-w="mom" onclick="setDeviceWho('mom')">엄마</button>
          </div>
        </div>
        <div class="hist-list" id="hist-list"></div>
        <div class="sheet-btns"><button class="btn btn-cancel" onclick="closeHistory()">닫기</button></div>
      </div>
    </div>

    <main class="content">
      <section class="screen active" id="screen-daily">
        <div class="screen-title" id="daily-title">데일리 · 오늘</div>
        <div class="people" id="people">
          <button class="person active" data-person="all"   onclick="pickPerson(this)">전체</button>
          <button class="person"        data-person="dad"   onclick="pickPerson(this)">아빠</button>
          <button class="person"        data-person="mom"   onclick="pickPerson(this)">엄마</button>
          <button class="person"        data-person="child" onclick="pickPerson(this)">딸</button>
        </div>
        <div class="clock-card"><div id="daily-clock"></div><div class="legend" id="daily-legend"></div></div>
        <div class="list" id="daily-list"></div>
      </section>

      <section class="screen" id="screen-week">
        <div class="screen-title" id="week-title">주간 · 이번 주</div>
        <div class="people" id="week-people">
          <button class="person active" data-person="all"   onclick="pickWeekPerson(this)">전체</button>
          <button class="person"        data-person="dad"   onclick="pickWeekPerson(this)">아빠</button>
          <button class="person"        data-person="mom"   onclick="pickWeekPerson(this)">엄마</button>
          <button class="person"        data-person="child" onclick="pickWeekPerson(this)">딸</button>
        </div>
        <div class="clock-card"><div class="week-evs" id="week-events"></div><div id="week-chart"></div><div class="legend" id="week-legend"></div></div>
        <div class="hint">예외를 넣은 날은 그 요일 칸만 다르게 보여요.</div>
      </section>

      <section class="screen" id="screen-month">
        <div class="screen-title">월간 · 달력</div>
        <div class="cal-head">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <div class="cal-title" id="cal-title"></div>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="day-detail" id="day-detail"></div>
      </section>
    </main>

    <nav class="tabbar">
      <button class="tab active" id="tab-daily" onclick="switchTab('daily')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>데일리
      </button>
      <button class="tab" id="tab-week" onclick="switchTab('week')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18M9 5v14M15 5v14"/></svg>주간
      </button>
      <button class="tab" id="tab-month" onclick="switchTab('month')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>월간
      </button>
    </nav>

    <button class="fab" onclick="openAdd()" aria-label="일정 추가">＋</button>

    <div class="modal" id="modal">
      <div class="sheet">
        <h3 id="sheet-title">새 일정</h3>
        <div class="form-msg" id="form-msg"></div>
        <div class="edit-note" id="edit-note" style="display:none"></div>
        <div class="field">
          <label>누구</label>
          <div class="who-pick" id="who-pick">
            <button class="person" data-person="dad"   onclick="pickFormWho(this)">아빠</button>
            <button class="person" data-person="mom"   onclick="pickFormWho(this)">엄마</button>
            <button class="person" data-person="child" onclick="pickFormWho(this)">딸</button>
          </div>
        </div>
        <div class="field"><label>무엇을</label><input type="text" id="f-title" placeholder="예: 병원 예약, 미용실" /></div>
        <div class="field"><label>종류 <span class="cat-note">(자동, 이상하면 직접 선택)</span></label>
          <div class="cat-pick" id="cat-pick"></div>
          <div class="cat-hint" id="cat-hint"></div>
          <div class="cat-add-panel" id="cat-add-panel" style="display:none">
            <div class="cat-panel-title" id="cat-panel-title">새 종류 만들기</div>
            <input type="text" id="cat-new-name" placeholder="종류 이름 (예: 산책, 병원)" />
            <div class="cat-colors" id="cat-colors"></div>
            <div class="cat-add-btns"><button class="btn-mini" onclick="saveCatPanel()">저장</button><button class="btn-mini ghost" onclick="closeCatPanel()">취소</button></div>
          </div>
        </div>
        <div class="times">
          <div class="field"><label>시작</label><input type="time" id="f-start" /></div>
          <div class="field"><label>끝</label><input type="time" id="f-end" /></div>
        </div>
        <div class="field" id="scope-field">
          <label>언제 적용할까요?</label>
          <div class="scope-pick" id="scope-pick">
            <button class="scope" data-scope="day"      onclick="pickScope(this)">이 날짜만</button>
            <button class="scope" data-scope="weekFrom" onclick="pickScope(this)">이 주</button>
            <button class="scope" data-scope="month"    onclick="pickScope(this)">이 달</button>
            <button class="scope" data-scope="year"     onclick="pickScope(this)">올해</button>
            <button class="scope" data-scope="dates"    onclick="pickScope(this)">직접 선택</button>
            <button class="scope" data-scope="base"     onclick="pickScope(this)">매일</button>
          </div>
          <div class="scope-hint" id="scope-hint"></div>
          <div class="minical" id="minical" style="display:none"></div>
        </div>
        <label class="pin-row"><input type="checkbox" id="f-pin" /><span>월간 달력에 표시 <span class="sub">(중요 일정)</span></span></label>
        <div class="sheet-btns">
          <button class="btn btn-cancel" onclick="closeModal()">취소</button>
          <button class="btn btn-del" id="btn-del" onclick="deleteItem()" style="display:none">삭제</button>
          <button class="btn btn-save" onclick="saveForm()">저장</button>
        </div>
        <button class="btn-gcal" onclick="addToGoogleCalendar()">구글 캘린더에 추가</button>

    function rebuildCatColors() { catColorObj = {}; catNameObj = {}; categories.forEach(function (c) { catColorObj[c.key] = c.color; catNameObj[c.key] = c.name; }); }
    rebuildCatColors();
    function colorForCat(key) { return catColorObj[key] || '#D3D1C7'; }   // 지워진 종류는 회색으로

    function categorize(t) {
      if (t.indexOf('취침') >= 0) return '수면';

    function toParts(s, e) { return e <= s ? [[s, 1440], [0, e]] : [[s, e]]; }

    function pointOnCircle(r, deg) { var a = deg * Math.PI / 180; return [CX + r * Math.sin(a), CY - r * Math.cos(a)]; }

    function buildClockSVG(items, who, showNow) {

      var dows = ['월', '화', '수', '목', '금', '토', '일'];
      var todayCol = (new Date().getDay() + 6) % 7;
      var svg = '';
      [6, 9, 12, 15, 18, 21].forEach(function (h) {
        var yy = y(h * 60);
        svg += '<line x1="32" y1="' + yy.toFixed(1) + '" x2="336" y2="' + yy.toFixed(1) + '" stroke="var(--line)" stroke-width="0.5"/>';
        svg += '<text x="28" y="' + (yy + 3).toFixed(1) + '" text-anchor="end" font-size="9" fill="#8C8B82">' + h + '</text>';
      });
      for (var d = 0; d < 7; d++) {
        var cx = x0 + d * colW;
        var col = d === 6 ? '#C4553B' : d === 5 ? '#3B6FBF' : '#2C2C2A';
        svg += '<text x="' + (cx + colW / 2).toFixed(1) + '" y="16" text-anchor="middle" font-size="11" fill="' + col + '">' + dows[d] + '</text>';
        // 각 요일은 '그 날짜'의 일정으로 그림 (예외 넣으면 그 칸만 달라짐)
        var items = itemsForDate(weekDates[d]);
        var segs = segmentsFor(items, who);
        var parts = [];
        segs.forEach(function (g) { if (g.e <= g.s) { parts.push({ s: g.s, e: 1440, color: g.color }); parts.push({ s: 0, e: g.e, color: g.color }); } else parts.push({ s: g.s, e: g.e, color: g.color }); });
        parts.forEach(function (p) {
          svg += '<rect x="' + (cx + 1).toFixed(1) + '" y="' + y(p.s).toFixed(1) + '" width="' + (colW - 2).toFixed(1) + '" height="' + (y(p.e) - y(p.s)).toFixed(1) + '" fill="' + p.color + '"/>';
        });
      }
      svg += '<rect x="' + (x0 + todayCol * colW).toFixed(1) + '" y="' + top + '" width="' + colW.toFixed(1) + '" height="' + H + '" fill="none" stroke="var(--accent)" stroke-width="1.6" rx="4"/>';
      // 현재 시간 가로선 (오늘 칸 진하게)
      var nowY = y(nowMinutes()), tcx = x0 + todayCol * colW;
      svg += '<line x1="32" y1="' + nowY.toFixed(1) + '" x2="336" y2="' + nowY.toFixed(1) + '" stroke="#C0392B" stroke-width="1" opacity="0.5"/>';
      svg += '<line x1="' + tcx.toFixed(1) + '" y1="' + nowY.toFixed(1) + '" x2="' + (tcx + colW).toFixed(1) + '" y2="' + nowY.toFixed(1) + '" stroke="#C0392B" stroke-width="2.5"/>';
      svg += '<circle cx="' + tcx.toFixed(1) + '" cy="' + nowY.toFixed(1) + '" r="3.5" fill="#C0392B"/>';
      document.getElementById('week-chart').innerHTML = '<svg viewBox="0 0 340 380" xmlns="http://www.w3.org/2000/svg">' + svg + '</svg>';
      var repItems = itemsForDate(weekDates[0]);
      document.getElementById('week-legend').innerHTML = legendHTML(legendEntries(who, segmentsFor(repItems, who)));

      // 요일별 중요 일정(체크한 것) + 수정 있는 날 점 표시
      var dows2 = ['월', '화', '수', '목', '금', '토', '일'];
      var strip = '';
      for (var wd = 0; wd < 7; wd++) {
        var full = weekDates[wd], dnum = parseYmd(full).getDate();
        var pins = calEvents(full);
        var labels = pins.slice(0, 2).map(function (ev) { return '<span class="cal-ev" style="background:' + people[ev.who].color + '">' + escapeHtml(ev.title) + '</span>'; }).join('');
        if (pins.length > 2) labels += '<span class="cal-more">+' + (pins.length - 2) + '</span>';
        var dot = (pins.length === 0 && hasException(full)) ? '<span class="wedit"></span>' : '';   // 수정만 있고 중요표시 없을 때
        strip += '<div class="wcol' + (full === todayStr ? ' wtoday' : '') + '"><div class="wcol-day">' + dows2[wd] + '<span class="wnum">' + dnum + dot + '</span></div><div class="wcol-list">' + labels + '</div></div>';
      }
      document.getElementById('week-events').innerHTML = strip;
    }
    function pickWeekPerson(btn) {
      document.querySelectorAll('#week-people .person').forEach(function (p) { p.classList.remove('active'); p.style.background = ''; });
      btn.classList.add('active'); weekPerson = btn.dataset.person; btn.style.background = people[weekPerson].color;
      drawWeek();
    }

    /* ===== 월간 (달력) ===== */
    var monthState = { y: 0, m: 0 };
    var selectedDate = null;
    var monthDetailPerson = 'all';
    function hasException(D) { return exceptions.some(function (ev) { return appliesOn(ev, D); }) || hides.some(function (h) { return h.scope ? appliesOn(h, D) : h.date === D; }); }
    function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    // 달력에 글자로 보여줄 '특정 날짜' 특별 일정
    function calEvents(D) {
      var out = [];
      schedule.forEach(function (b) { if (b.pin && !hiddenOn(b.id, D)) out.push(b); });
      exceptions.forEach(function (ev) { if (ev.pin && appliesOn(ev, D)) out.push(ev); });
      return out.sort(function (a, b) { return toMin(a.start) - toMin(b.start); });
    }
    function renderMonth() {
      var y = monthState.y, m = monthState.m;
      var first = new Date(y, m, 1).getDay(), dim = new Date(y, m + 1, 0).getDate();
      var today = new Date(), isThisMonth = (y === today.getFullYear() && m === today.getMonth());
      document.getElementById('cal-title').textContent = y + '년 ' + (m + 1) + '월';
      var dows = ['일', '월', '화', '수', '목', '금', '토'];
      var html = dows.map(function (d, i) { return '<div class="cal-dow' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '') + '">' + d + '</div>'; }).join('');
      for (var b = 0; b < first; b++) html += '<div class="cal-cell blank"></div>';
      for (var d = 1; d <= dim; d++) {
        var full = ymdOf(y, m, d);
        var cls = 'cal-cell';
        if (isThisMonth && d === today.getDate()) cls += ' today';
        if (selectedDate === d) cls += ' selected';
        var evs = calEvents(full), labels = '';
        evs.slice(0, 2).forEach(function (ev) {
          labels += '<span class="cal-ev" style="background:' + people[ev.who].color + '">' + escapeHtml(ev.title) + '</span>';
        });
        if (evs.length > 2) labels += '<span class="cal-more">+' + (evs.length - 2) + '</span>';
        html += '<div class="' + cls + '" onclick="selectDay(' + d + ')"><span class="cal-daynum">' + d + '</span><span class="cal-evs">' + labels + '</span></div>';
      }
      document.getElementById('cal-grid').innerHTML = html;
    }
    function selectDay(d) { selectedDate = d; renderMonth(); renderDayDetail(d); }
    function renderDayDetail(d) {
      var y = monthState.y, m = monthState.m, who = monthDetailPerson;
      var full = ymdOf(y, m, d);
      var dow = ['일', '월', '화', '수', '목', '금', '토'][new Date(y, m, d).getDay()];
      var items = itemsForDate(full);
      var picker = ['all', 'dad', 'mom', 'child'].map(function (k) {
        var on = (k === who), style = on ? ' style="background:' + people[k].color + '"' : '';
        return '<button class="person' + (on ? ' active' : '') + '" data-person="' + k + '" onclick="pickDetailPerson(this)"' + style + '>' + people[k].name + '</button>';
      }).join('');
      var clock = '<div class="clock-card"><div>' + buildClockSVG(items, who, full === todayStr) + '</div><div class="legend">' + legendHTML(legendEntries(who, segmentsFor(items, who))) + '</div></div>';
      document.getElementById('day-detail').innerHTML =
        '<h3>' + (m + 1) + '월 ' + d + '일 (' + dow + ') 일정</h3>' +
        '<div class="people" style="margin-top:12px">' + picker + '</div>' + clock +
        '<div class="list">' + listHTML(items, who, full) + '</div>';
    }
    function pickDetailPerson(btn) { monthDetailPerson = btn.dataset.person; renderDayDetail(selectedDate); }
    function changeMonth(delta) {

    }

    /* ============================================================
       저장 · 불러오기 · 번호(id)
    ============================================================ */
    var STORAGE_KEY = 'family_schedule_v2';
    var nextId = 1;
    var dbRef = null, firebaseOn = false, applyingRemote = false;

    // 저장 : 연결돼 있으면 공동 저장소로, 그리고 폰 안에도 백업
    function saveAll() {
      var data = { base: schedule, exceptions: exceptions, hides: hides, categories: categories, history: history };
      if (firebaseOn && dbRef && !applyingRemote) { try { dbRef.set(data); } catch (e) {} }
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
    }
    // Firebase 실시간 연결 (설정이 채워져 있을 때만)
    function initFirebase() {
      try {
        if (typeof firebase === 'undefined') return;                        // SDK 못 불러옴
        if (String(firebaseConfig.databaseURL).indexOf('여기에') >= 0) return;   // 아직 설정 안 함
        firebase.initializeApp(firebaseConfig);
        dbRef = firebase.database().ref('schedules/' + FAMILY_CODE);
        firebaseOn = true;
        // 다른 폰(또는 내)에서 바뀌면 실시간으로 받아 화면 갱신
        dbRef.on('value', function (snap) {
          var data = snap.val();
          if (!data) { saveAll(); return; }        // 저장소가 비었으면 지금 내 데이터로 채움
          applyingRemote = true;
          schedule = data.base || [];
          exceptions = data.exceptions || [];
          hides = data.hides || [];
          if (data.categories && data.categories.length) { categories = data.categories; normalizeCats(); rebuildCatColors(); buildCatButtons(); }
          history = data.history || [];
          assignIds(); refreshAll();
          applyingRemote = false;
        });
      } catch (e) { firebaseOn = false; }
    }
    function loadAll() {
      try {
        var s = localStorage.getItem(STORAGE_KEY);
        if (s) { var o = JSON.parse(s);
          if (o && o.base) { schedule = o.base; exceptions = o.exceptions || []; hides = o.hides || [];
            if (o.categories && o.categories.length) { categories = o.categories; normalizeCats(); rebuildCatColors(); }
            history = o.history || []; } }
      } catch (e) {}
    }
    function assignIds() {
      schedule.concat(exceptions).forEach(function (r) {
        if (typeof r.id !== 'number') r.id = nextId++; else if (r.id >= nextId) nextId = r.id + 1;
      });
    }
    function refreshAll() { renderDaily(); drawWeek(); if (selectedDate) renderDayDetail(selectedDate); renderMonth(); }

    /* ============================================================
       입력창(모달)
    ============================================================ */
    var editingItem = null;    // 수정 중인 일정 (새로 추가면 null)
    var editContextDate = todayStr;   // 지금 보고 있는 날짜
    var formWho = 'dad';
    var formCat = '';          // 직접 고른 종류 ('' = 자동)
    var formScope = 'day';
    var formAnchor = todayStr; // 범위의 기준 날짜
    var pickedDates = [];      // '직접 선택'으로 고른 날짜들
    var miniState = { y: 0, m: 0 };

    function pickFormWho(btn) {
      document.querySelectorAll('#who-pick .person').forEach(function (p) { p.classList.remove('active'); p.style.background = ''; });
      btn.classList.add('active'); formWho = btn.dataset.person; btn.style.background = people[formWho].color;
    }
    function setFormWho(who) { pickFormWho(document.querySelector('#who-pick .person[data-person="' + who + '"]')); }

    // 종류 버튼 만들기 (자동 + 각 종류 + 삭제(×) + 새 종류)
    var PALETTE = ['#B4B2A9', '#AEBEE0', '#6FA85C', '#E0A24E', '#E8896B', '#4FB0A0', '#B49BD8', '#C7C2B6', '#3B7DBF', '#D96BA0', '#7BB661', '#66B2C2'];
    var newCatColor = PALETTE[0];
    function catAttr(s) { return String(s).replace(/'/g, '').replace(/"/g, ''); }
    function buildCatButtons() {
      var prev = formCat;
      var html = '<button class="cat" data-cat="" data-color="" onclick="pickCat(this)">자동</button>';
      categories.forEach(function (c) {
        var k = catAttr(c.key);
        html += '<button class="cat" data-cat="' + k + '" data-color="' + c.color + '" onclick="pickCat(this)">' +
                '<span class="swatch" style="background:' + c.color + '"></span>' + escapeHtml(c.name) +
                '<span class="cat-x" onclick="deleteCat(event,\'' + k + '\')">×</span></button>';
      });
      html += '<button class="cat cat-manage" onclick="toggleCatManage()">편집</button>';
      html += '<button class="cat cat-add" onclick="openCatPanel(\'\')">＋ 새 종류</button>';
      document.getElementById('cat-pick').innerHTML = html;
      setCat(prev);
    }
    function selectCatButton(el) {
      document.querySelectorAll('#cat-pick .cat').forEach(function (b) { b.classList.remove('active'); b.style.background = ''; b.style.color = ''; });
      el.classList.add('active');
      formCat = el.dataset.cat;
      var color = el.dataset.color || '#2B7A78';
      el.style.background = color; el.style.color = '#fff';
    }
    function pickCat(el) {
      if (el.dataset.cat && document.getElementById('cat-pick').classList.contains('managing')) { renameCat(el.dataset.cat); return; }
      selectCatButton(el);
    }
    function setCat(cat) { var sel = document.querySelector('#cat-pick .cat[data-cat="' + (cat || '') + '"]'); if (sel) selectCatButton(sel); else if (cat) setCat(''); }

    function toggleCatManage() {
      var p = document.getElementById('cat-pick'); p.classList.toggle('managing');
      document.getElementById('cat-hint').textContent = p.classList.contains('managing') ? '이름을 누르면 변경, ×를 누르면 삭제돼요.' : '';
    }
    var editingCatKey = null;   // null=새로 추가, key=그 종류 편집
    function renameCat(key) { openCatPanel(key); }
    function openCatPanel(key) {
      editingCatKey = key || null;
      var nameEl = document.getElementById('cat-new-name');
      if (editingCatKey) {
        var cat = categories.filter(function (c) { return c.key === editingCatKey; })[0];
        if (!cat) return;
        nameEl.value = cat.name; newCatColor = cat.color;
        document.getElementById('cat-panel-title').textContent = '이름·색 바꾸기';
      } else {
        nameEl.value = ''; newCatColor = PALETTE[0];

    function buildColorSwatches() {
      document.getElementById('cat-colors').innerHTML = PALETTE.map(function (col) {
        return '<span class="cc' + (col === newCatColor ? ' on' : '') + '" style="background:' + col + '" onclick="pickNewColor(\'' + col + '\')"></span>';
      }).join('');
    }
    function pickNewColor(col) { newCatColor = col; buildColorSwatches(); }
    function saveCatPanel() {
      var name = document.getElementById('cat-new-name').value.trim().replace(/['"]/g, '');
      var msg = document.getElementById('form-msg');
      if (!name) { msg.textContent = '종류 이름을 적어주세요.'; return; }
      if (categories.some(function (c) { return c.name === name && c.key !== editingCatKey; })) { msg.textContent = '이미 있는 이름이에요.'; return; }
      if (editingCatKey) {                       // 이름·색 변경 (key 그대로 → 연결 안 깨짐)
        var k = editingCatKey, cat = categories.filter(function (c) { return c.key === k; })[0];
        cat.name = name; cat.color = newCatColor;
        rebuildCatColors(); saveAll(); buildCatButtons(); refreshAll(); closeCatPanel(); setCat(k);
      } else {                                    // 새 종류 추가
        var key = 'c' + Date.now();
        categories.push({ key: key, name: name, color: newCatColor });
        rebuildCatColors(); saveAll(); buildCatButtons(); refreshAll(); closeCatPanel(); setCat(key);
      }
    }
    function deleteCat(ev, key) {
      ev.stopPropagation();
      if (categories.length <= 1) return;
      categories = categories.filter(function (c) { return c.key !== key; });
      if (formCat === key) formCat = '';
      rebuildCatColors(); saveAll(); buildCatButtons(); refreshAll();
    }

    function pickScope(btn) {
      document.querySelectorAll('#scope-pick .scope').forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active'); formScope = btn.dataset.scope;
      var showCal = (formScope === 'dates');
      document.getElementById('minical').style.display = showCal ? '' : 'none';
      if (showCal) { var a = parseYmd(formAnchor); miniState = { y: a.getFullYear(), m: a.getMonth() }; renderMiniCal(); }
      updateScopeHint();
    }
    function updateScopeHint() {
      var a = parseYmd(formAnchor), mo = a.getMonth() + 1, dy = a.getDate(), yr = a.getFullYear();
      var sun = sundayOf(a), t;
      if (formScope === 'day') t = mo + '월 ' + dy + '일 하루만 적용돼요.';
      else if (formScope === 'weekFrom') t = mo + '월 ' + dy + '일부터 ' + (sun.getMonth() + 1) + '월 ' + sun.getDate() + '일(일요일)까지 적용돼요.';
      else if (formScope === 'month') t = yr + '년 ' + mo + '월 한 달 전체에 적용돼요.';
      else if (formScope === 'year') t = yr + '년 한 해 전체에 적용돼요.';
      else if (formScope === 'dates') t = '달력에서 날짜를 직접 고르세요. (' + pickedDates.length + '일 선택됨)';

      document.getElementById('scope-hint').textContent = t;
    }
    function renderMiniCal() {
      var y = miniState.y, m = miniState.m;
      var first = new Date(y, m, 1).getDay(), dim = new Date(y, m + 1, 0).getDate();
      var dows = ['일', '월', '화', '수', '목', '금', '토'];
      var full = monthAllDates(y, m).every(function (x) { return pickedDates.indexOf(x) >= 0; });
      var html = '<div class="mc-head"><button class="mc-nav" onclick="miniMonth(-1)">‹</button>' +
                 '<div class="mc-title">' + y + '년 ' + (m + 1) + '월</div>' +
                 '<button class="mc-nav" onclick="miniMonth(1)">›</button></div>' +
                 '<button class="mc-allbtn" onclick="selectWholeMonth()">' + (full ? '이 달 전체 해제' : '이 달 전체 선택') + '</button>' +
                 '<div class="mc-grid">';
      html += dows.map(function (d) { return '<div class="mc-dow">' + d + '</div>'; }).join('');
      for (var b = 0; b < first; b++) html += '<div class="mc-cell blank"></div>';
      for (var d = 1; d <= dim; d++) {
        var full = ymdOf(y, m, d);

    // 한 달의 모든 날짜 목록
    function monthAllDates(y, m) { var dim = new Date(y, m + 1, 0).getDate(), a = []; for (var d = 1; d <= dim; d++) a.push(ymdOf(y, m, d)); return a; }
    // 지금 보는 달을 통째로 선택 / 이미 다 선택돼 있으면 통째로 해제

    function openAdd() {

    function isBaseItem(row) { return schedule.indexOf(row) >= 0; }
    function openEdit(id, dateStr) {
      var row = schedule.concat(exceptions).filter(function (r) { return r.id === id; })[0];
      if (!row) return;

    // 예외에서 특정 날짜 D 만 떼어내기
    function detachDate(ev, D) {
      if (ev.scope === 'dates') {
        ev.dates = ev.dates.filter(function (x) { return x !== D; });
        if (!ev.dates.length) exceptions = exceptions.filter(function (r) { return r.id !== ev.id; });
      } else { ev.excl = ev.excl || []; if (ev.excl.indexOf(D) < 0) ev.excl.push(D); }
    }
    // 선택한 범위(scope) → 날짜 정보 만들기
    function scopeFields(S, anchor, picked) {
      var o = { scope: S };
      if (S === 'day') o.date = anchor;
      else if (S === 'weekFrom') { o.date = anchor; o.weekEnd = ymd(sundayOf(parseYmd(anchor))); }
      else if (S === 'month') o.ym = anchor.slice(0, 7);
      else if (S === 'year') o.y = Number(anchor.slice(0, 4));
      else if (S === 'dates') o.dates = picked.slice();
      return o;
    }
    function mergeInto(base, extra) { for (var k in extra) base[k] = extra[k]; return base; }
    function newEx(v, sf) { return mergeInto({ id: nextId++, who: v.who, start: v.start, end: v.end, title: v.title, pin: !!v.pin, cat: v.cat || '', editor: v.editor || '' }, sf); }
    function assignVals(row, v) { row.who = v.who; row.start = v.start; row.end = v.end; row.title = v.title; row.pin = !!v.pin; row.cat = v.cat || ''; row.editor = v.editor || ''; }

    // 수정 적용 (추가와 똑같은 6개 범위)
    function applyEditScoped(row, v) {
      var S = formScope, D = formAnchor;
      if (S === 'base') {                                  // 매일 전체
        if (isBaseItem(row)) assignVals(row, v);
        else { exceptions = exceptions.filter(function (r) { return r.id !== row.id; }); schedule.push({ id: nextId++, who: v.who, start: v.start, end: v.end, title: v.title, pin: !!v.pin, cat: v.cat || '', editor: v.editor || '' }); }
        return;
      }
      var sf = scopeFields(S, D, pickedDates);
      if (S === 'day') {                                   // 이 날짜만
        if (isBaseItem(row)) hides.push({ baseId: row.id, scope: 'day', date: D });
        else if (row.scope === 'day') { assignVals(row, v); return; }
        else detachDate(row, D);
        exceptions.push(newEx(v, sf));
        return;
      }
      // 이 주 / 이 달 / 올해 / 직접선택
      if (isBaseItem(row)) {
        hides.push(mergeInto({ baseId: row.id }, sf));     // 그 범위 동안 기본 가리기
        exceptions.push(newEx(v, sf));
      } else {
        exceptions = exceptions.filter(function (r) { return r.id !== row.id; });  // 이 예외를 새 범위로 교체
        exceptions.push(newEx(v, sf));
      }
    }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }

    /* ===== 최근 수정 내역 ===== */
    function fmtHistTime(t) {
      var d = new Date(t), now = new Date();
      var hm = ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
      var dd = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      var t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      var diff = Math.round((t0 - dd) / 86400000);
      var day = diff === 0 ? '오늘' : diff === 1 ? '어제' : (d.getMonth() + 1) + '/' + d.getDate();
      return day + ' ' + hm;
    }
    function renderHistory() {
      document.querySelectorAll('#hist-modal .who-b').forEach(function (b) { b.classList.toggle('on', b.dataset.w === deviceWho); });
      var el = document.getElementById('hist-list');
      if (!history.length) { el.innerHTML = '<div class="hist-empty">아직 수정 내역이 없어요.</div>'; return; }
      el.innerHTML = history.map(function (h) {
        var mine = h.who && h.who === deviceWho;
        var who = h.who ? people[h.who].name : '미지정';
        var actCls = h.act === '삭제' ? 'del' : h.act === '추가' ? 'add' : 'edit';
        return '<div class="hist-item"><div class="hist-top"><span class="hist-who' + (mine ? ' mine' : '') + '">' + (mine ? '✓ ' : '') + who + '</span><span class="hist-time">' + fmtHistTime(h.t) + '</span></div>' +
               '<div class="hist-body"><span class="hist-act ' + actCls + '">' + h.act + '</span> ' + escapeHtml(h.title) + (h.when ? ' <span class="hist-when">(' + h.when + ')</span>' : '') + '</div></div>';
      }).join('');
    }
    function openHistory() { document.getElementById('hist-modal').classList.add('open'); renderHistory(); }
    function closeHistory() { document.getElementById('hist-modal').classList.remove('open'); }
    function setDeviceWho(w) { deviceWho = w; try { localStorage.setItem('family_device_who', w); } catch (e) {} renderHistory(); }

    function saveForm() {
      var title = document.getElementById('f-title').value.trim();
      var start = document.getElementById('f-start').value, end = document.getElementById('f-end').value;
      var msg = document.getElementById('form-msg');
      if (!title) { msg.textContent = '무엇을 하는지 적어주세요.'; return; }
      if (!start || !end) { msg.textContent = '시작과 끝 시간을 정해주세요.'; return; }
      if (start === end) { msg.textContent = '시작과 끝 시간이 같아요.'; return; }

      // 같은 사람이 같은 시간에 겹치지 않도록 확인
      var checkDate = editingItem ? editContextDate : formAnchor;
      var selfId = editingItem ? editingItem.id : -1;
      var compare = itemsForDate(checkDate).slice();
      if (formScope !== 'day') {   // 매일/이 주/이 달/올해/직접선택 → 평소 루틴(기본 일정)과도 검사
        schedule.forEach(function (b) { if (!compare.some(function (x) { return x.id === b.id; })) compare.push(b); });
      }
      var others = compare.filter(function (r) { return r.who === formWho && r.id !== selfId; });
      var clash = null;
      for (var ci = 0; ci < others.length; ci++) {
        if (rangesOverlap(toMin(start), toMin(end), toMin(others[ci].start), toMin(others[ci].end))) { clash = others[ci]; break; }
      }
      if (clash) { msg.textContent = '이 시간엔 이미 「' + clash.title + '」(' + clash.start + '–' + clash.end + ')이(가) 있어요. 겹치지 않게 해주세요.'; return; }
      if (formScope === 'dates' && !pickedDates.length) { msg.textContent = '적용할 날짜를 하나 이상 고르세요.'; return; }

      var pin = document.getElementById('f-pin').checked;
      var vals = { who: formWho, start: start, end: end, title: title, pin: pin, cat: formCat, editor: deviceWho };
      var scopeLabel = { day: '이 날짜만', weekFrom: '이 주', month: '이 달', year: '올해', dates: '직접 선택', base: '매일' }[formScope] || '';
      if (editingItem) {                        // 수정 (6개 범위)
        applyEditScoped(editingItem, vals);
      } else if (formScope === 'base') {        // 매일 → 기본 일정에 추가
        schedule.push({ id: nextId++, who: formWho, start: start, end: end, title: title, pin: pin, cat: formCat, editor: deviceWho });
      } else {                                  // 예외로 추가
        exceptions.push(newEx(vals, scopeFields(formScope, formAnchor, pickedDates)));
      }
      logChange(editingItem ? '수정' : '추가', people[formWho].name + ' ' + title, scopeLabel);
      saveAll(); refreshAll(); closeModal();
    }
    function deleteItem() {
      if (!editingItem) return;
      var row = editingItem, S = formScope, D = formAnchor;
      if (S === 'dates' && !pickedDates.length) { document.getElementById('form-msg').textContent = '삭제할 날짜를 고르세요.'; return; }
      if (S === 'base') {                        // 전체 삭제
        schedule = schedule.filter(function (r) { return r.id !== row.id; });
        exceptions = exceptions.filter(function (r) { return r.id !== row.id; });
      } else if (S === 'day') {                  // 이 날짜만
        if (isBaseItem(row)) hides.push({ baseId: row.id, scope: 'day', date: D });
        else if (row.scope === 'day') exceptions = exceptions.filter(function (r) { return r.id !== row.id; });
        else detachDate(row, D);
      } else if (S === 'dates') {                // 고른 날짜들만
        if (isBaseItem(row)) hides.push(mergeInto({ baseId: row.id }, scopeFields('dates', D, pickedDates)));
        else pickedDates.forEach(function (d) { detachDate(row, d); });
      } else {                                   // 이 주 / 이 달 / 올해
        if (isBaseItem(row)) hides.push(mergeInto({ baseId: row.id }, scopeFields(S, D, pickedDates)));
        else exceptions = exceptions.filter(function (r) { return r.id !== row.id; });
      }
      var delLabel = { day: '이 날짜만', weekFrom: '이 주', month: '이 달', year: '올해', dates: '직접 선택', base: '매일' }[S] || '';
      logChange('삭제', people[row.who].name + ' ' + row.title, delLabel);
      saveAll(); refreshAll(); closeModal();
    }

    /* 구글 캘린더에 이 일정을 보내기 (제목·날짜·시간이 채워진 채로 열려요) */
    function gcalStamp(dateStr, timeStr) { return dateStr.replace(/-/g, '') + 'T' + timeStr.replace(':', '') + '00'; }
    function addToGoogleCalendar() {
      var title = document.getElementById('f-title').value.trim();
      var start = document.getElementById('f-start').value, end = document.getElementById('f-end').value;
      var msg = document.getElementById('form-msg');
      if (!title || !start || !end) { msg.textContent = '제목과 시간을 먼저 채워주세요.'; return; }
      var D = editingItem ? editContextDate : formAnchor;   // 어느 날짜의 일정인지
      var endDate = D;
      if (toMin(end) <= toMin(start)) { var d = parseYmd(D); d.setDate(d.getDate() + 1); endDate = ymd(d); }  // 자정 넘김
      var dates = gcalStamp(D, start) + '/' + gcalStamp(endDate, end);
      var url = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
                '&text=' + encodeURIComponent(title) + '&dates=' + dates + '&ctz=Asia/Seoul';
      window.open(url, '_blank');
    }

    /* ===== 공통 : 탭 / 날짜 ===== */
    var currentTab = 'daily';
    function switchTab(name) {
      currentTab = name;
      document.querySelectorAll('.screen').forEach(function (s) { s.classList.remove('active'); });
      document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
      var id = (name === 'daily') ? 'screen-daily' : (name === 'week') ? 'screen-week' : 'screen-month';
      document.getElementById(id).classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }
    function showToday() {
      var now = new Date(), days = ['일', '월', '화', '수', '목', '금', '토'];
      var txt = (now.getMonth() + 1) + '월 ' + now.getDate() + '일 ' + days[now.getDay()] + '요일';
      document.getElementById('today').textContent = txt;
      document.getElementById('daily-title').textContent = '데일리 · ' + txt;
    }

    /* ===== 앱 시작 ===== */
    loadAll(); assignIds(); showToday();
    buildCatButtons();
    pickPerson(document.querySelector('#people .person.active'));
    pickWeekPerson(document.querySelector('#week-people .person.active'));
    var t = new Date();
    monthState = { y: t.getFullYear(), m: t.getMonth() };
    renderMonth(); selectDay(t.getDate());
    initFirebase();   // 설정돼 있으면 실시간 공유 시작
    // 1분마다 '지금' 표시를 갱신 (시계 바늘·목록 강조)
    setInterval(function () {
      todayStr = ymd(new Date());
      renderDaily(); drawWeek();
      if (selectedDate) renderDayDetail(selectedDate);
    }, 60000);
  </script>
</body>
